<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Demo</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe2ea;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --success: #059669;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .app {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 20px;
    }
    .title {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }
    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      margin-bottom: 16px;
    }
    .toolbar input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
      background: #fff;
    }
    .toolbar input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }
    .btn {
      border: 0;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 14px;
      cursor: pointer;
      color: #fff;
      background: var(--primary);
    }
    .btn:hover { background: var(--primary-dark); }
    .btn.secondary {
      background: #64748b;
    }
    .btn.secondary:hover { background: #475569; }
    .btn.danger {
      background: var(--danger);
    }
    .btn.danger:hover { background: #b91c1c; }
    .list {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }
    .item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      background: #fff;
    }
    .item.done .text {
      text-decoration: line-through;
      color: var(--muted);
    }
    .check {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .text {
      word-break: break-word;
    }
    .edit-box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      width: 100%;
    }
    .edit-box input {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
    }
    .meta {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .error {
      margin-bottom: 12px;
      color: #b91c1c;
      background: #fef2f2;
      border: 1px solid #fecaca;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
    }
    .empty {
      padding: 24px 12px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
    }
    @media (max-width: 720px) {
      .header { flex-direction: column; align-items: start; }
      .toolbar { grid-template-columns: 1fr; }
      .item { grid-template-columns: auto 1fr; }
      .item .actions { grid-column: 1 / -1; display: flex; gap: 8px; justify-content: flex-end; }
      .edit-box { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app" class="app">
    <div class="header">
      <div>
        <h1 class="title">Todo Demo</h1>
        <p class="sub">Spring Boot + Vue 的简洁待办界面</p>
      </div>
      <button class="btn secondary" @click="loadTodos" :disabled="loading">刷新列表</button>
    </div>

    <div class="panel">
      <div v-if="error" class="error">{{ error }}</div>

      <div class="toolbar">
        <input
          v-model.trim="newTitle"
          type="text"
          placeholder="输入一个新的待办事项"
          @keyup.enter="createTodo"
        />
        <button class="btn" @click="createTodo" :disabled="loading">新增</button>
        <button class="btn secondary" @click="clearForm" :disabled="loading">清空</button>
      </div>

      <div v-if="loading" class="empty">正在加载...</div>

      <div v-else-if="todos.length === 0" class="empty">还没有待办，先添加一条吧。</div>

      <div v-else class="list">
        <div class="item" v-for="todo in todos" :key="todo.id" :class="{ done: todo.completed }">
          <input class="check" type="checkbox" :checked="todo.completed" @change="toggleDone(todo)" />

          <div v-if="editingId === todo.id" class="edit-box">
            <input v-model.trim="editTitle" type="text" @keyup.enter="saveEdit(todo)" />
            <button class="btn" @click="saveEdit(todo)">保存</button>
          </div>

          <div v-else class="text">
            {{ todo.title }}
          </div>

          <div class="actions">
            <button class="btn secondary" @click="startEdit(todo)" v-if="editingId !== todo.id">编辑</button>
            <button class="btn secondary" @click="cancelEdit" v-else>取消</button>
            <button class="btn danger" @click="removeTodo(todo.id)">删除</button>
          </div>
        </div>
      </div>

      <div class="meta">
        <span>总数：{{ todos.length }}</span>
        <span>已完成：{{ doneCount }}</span>
      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          todos: [
            { id: 1, title: '学习 Spring Boot 静态资源托管', completed: true },
            { id: 2, title: '编写 Todo 接口联调', completed: false },
            { id: 3, title: '完善页面样式与交互', completed: false }
          ],
          nextMockId: 4,
          newTitle: '',
          editTitle: '',
          editingId: null,
          loading: false,
          error: ''
        };
      },
      computed: {
        doneCount() {
          return this.todos.filter(item => item.completed).length;
        }
      },
      methods: {
        async request(url, options) {
          const response = await fetch(url, options);
          if (!response.ok) {
            let message = `请求失败：${response.status}`;
            try {
              const body = await response.json();
              message = body.message || message;
            } catch (e) {}
            throw new Error(message);
          }
          if (response.status === 204) {
            return null;
          }
          return response.json();
        },
        async loadTodos() {
          this.loading = true;
          this.error = '';
          try {
            this.todos = await this.request('/todos');
          } catch (err) {
            this.error = err.message;
          } finally {
            this.loading = false;
          }
        },
        clearForm() {
          this.newTitle = '';
          this.error = '';
        },
        async createTodo() {
          if (!this.newTitle.trim()) {
            this.error = '请输入待办内容';
            return;
          }
          this.loading = true;
          this.error = '';
          try {
            await this.request('/todos', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ title: this.newTitle })
            });
            this.newTitle = '';
            await this.loadTodos();
          } catch (err) {
            this.error = err.message;
          } finally {
            this.loading = false;
          }
        },
        startEdit(todo) {
          this.editingId = todo.id;
          this.editTitle = todo.title;
          this.error = '';
        },
        cancelEdit() {
          this.editingId = null;
          this.editTitle = '';
        },
        async saveEdit(todo) {
          if (!this.editTitle.trim()) {
            this.error = '标题不能为空';
            return;
          }
          this.loading = true;
          this.error = '';
          try {
            await this.request('/todos/' + todo.id, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                title: this.editTitle,
                completed: todo.completed
              })
            });
            this.cancelEdit();
            await this.loadTodos();
          } catch (err) {
            this.error = err.message;
          } finally {
            this.loading = false;
          }
        },
        async toggleDone(todo) {
          this.loading = true;
          this.error = '';
          try {
            await this.request('/todos/' + todo.id, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                title: todo.title,
                completed: !todo.completed
              })
            });
            await this.loadTodos();
          } catch (err) {
            this.error = err.message;
          } finally {
            this.loading = false;
          }
        },
        async removeTodo(id) {
          if (!confirm('确定删除这条待办吗？')) {
            return;
          }
          this.loading = true;
          this.error = '';
          try {
            await this.request('/todos/' + id, { method: 'DELETE' });
            await this.loadTodos();
          } catch (err) {
            this.error = err.message;
          } finally {
            this.loading = false;
          }
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
